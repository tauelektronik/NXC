# NXC — Parâmetros do Kernel (sysctl)
# Otimizado para streaming IPTV com 10.000+ usuários simultâneos
# Aplicar: sysctl -p /etc/sysctl.d/99-nxc.conf

# ── File descriptors ──
fs.file-max = 2000000
fs.nr_open  = 2000000

# ── TCP — Filas de conexão ──
net.ipv4.tcp_max_syn_backlog    = 65535
net.core.somaxconn              = 65535
net.core.netdev_max_backlog     = 500000

# ── TCP — Gerenciamento de conexões ──
net.ipv4.tcp_max_tw_buckets     = 2000000
net.ipv4.tcp_tw_reuse           = 1
net.ipv4.tcp_fin_timeout        = 10
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.ip_local_port_range    = 1024 65535
net.ipv4.tcp_syn_retries        = 3
net.ipv4.tcp_synack_retries     = 3

# ── TCP — Buffers de rede ──
net.core.rmem_max               = 268435456
net.core.wmem_max               = 268435456
net.core.rmem_default           = 31457280
net.core.wmem_default           = 31457280
net.ipv4.tcp_rmem               = 4096 87380 67108864
net.ipv4.tcp_wmem               = 4096 65536 67108864

# ── Congestion control (BBR — recomendado para streaming) ──
net.core.default_qdisc          = fq
net.ipv4.tcp_congestion_control = bbr

# ── Memória virtual ──
vm.swappiness                   = 10
vm.dirty_ratio                  = 15
vm.dirty_background_ratio       = 5
vm.overcommit_memory            = 1
